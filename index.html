<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal – Municipio de Caá Catí</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Raleway:wght@300;400;600&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
<style>
  :root {
    --naranja: #F07820;
    --naranja-oscuro: #C95F0A;
    --naranja-claro: #FFA04A;
    --blanco: #FFFFFF;
    --negro: #080808;
    --gris-oscuro: #101010;
    --gris-card: #181818;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%; width: 100%;
    background: var(--negro);
    font-family: 'Raleway', sans-serif;
    overflow: hidden;
  }

  /* ===================== INTRO ===================== */
  #intro {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    background: var(--negro);
    transition: opacity 1s ease, transform 1s ease;
  }
  #intro.fade-out {
    opacity: 0; transform: scale(1.04);
    pointer-events: none;
  }

  #introCanvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    cursor: pointer;
  }

  /* ===================== PORTAL ===================== */
  #portal {
    position: fixed; inset: 0; z-index: 50;
    opacity: 0; pointer-events: none;
    transition: opacity 0.9s 0.15s ease;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: var(--gris-oscuro);
    overflow: hidden;
  }
  #portal.visible { opacity: 1; pointer-events: all; }

  #portal::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 90% 50% at 50% -5%, rgba(240,120,32,0.10) 0%, transparent 65%),
      radial-gradient(ellipse 60% 40% at 50% 110%, rgba(240,120,32,0.06) 0%, transparent 60%);
    pointer-events: none;
  }

  .portal-content {
    position: relative; z-index: 1;
    width: 100%;
    max-width: 1060px;
    padding: 0 16px;
    display: flex; flex-direction: column;
    align-items: center;
  }

  .portal-header {
    display: flex; align-items: center; gap: 14px;
    width: 100%;
    margin-bottom: 14px;
    padding-bottom: 14px;
    border-bottom: 1px solid rgba(240,120,32,0.2);
    animation: fadeDown 0.6s ease both;
  }
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .portal-logo {
    width: 44px; height: 44px; border-radius: 50%;
    box-shadow: 0 0 14px rgba(240,120,32,0.4);
    flex-shrink: 0;
  }
  .portal-header-text h1 {
    font-family: 'Cinzel', serif;
    color: var(--blanco);
    font-size: clamp(15px, 2vw, 22px);
    letter-spacing: 3px; line-height: 1.2;
  }
  .portal-header-text p {
    font-family: 'Dancing Script', cursive;
    color: var(--naranja-claro);
    font-size: 16px; margin-top: 2px;
  }

  /* Grid 2×2 — siempre en pantalla, sin scroll */
  .apps-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 14px;
    width: 100%;
    height: calc(100vh - 110px);
  }

  .app-card {
    background: var(--gris-card);
    border: 1px solid rgba(240,120,32,0.08);
    border-radius: 10px;
    padding: 0 20px;
    text-decoration: none; color: inherit;
    display: flex; flex-direction: column; justify-content: center;
    position: relative; overflow: hidden;
    transition: transform 0.3s cubic-bezier(0.16,1,0.3,1),
                border-color 0.3s, box-shadow 0.3s;
    animation: cardIn 0.55s ease both;
    min-height: 0;
  }
  .app-card:nth-child(1) { animation-delay: 0.08s; }
  .app-card:nth-child(2) { animation-delay: 0.16s; }
  .app-card:nth-child(3) { animation-delay: 0.24s; }
  .app-card:nth-child(4) { animation-delay: 0.32s; }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .app-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--naranja-oscuro), var(--naranja-claro));
    transform: scaleX(0); transform-origin: left;
    transition: transform 0.38s cubic-bezier(0.16,1,0.3,1);
  }
  .app-card::after {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(circle at 50% -10%, rgba(240,120,32,0.07), transparent 65%);
    opacity: 0; transition: opacity 0.3s;
  }
  .app-card:hover {
    transform: translateY(-4px);
    border-color: rgba(240,120,32,0.35);
    box-shadow: 0 12px 36px rgba(0,0,0,0.5), 0 0 20px rgba(240,120,32,0.08);
  }
  .app-card:hover::before { transform: scaleX(1); }
  .app-card:hover::after  { opacity: 1; }

  .app-card.dev {
    opacity: 0.6; cursor: default; pointer-events: none;
  }

  .card-row {
    display: flex; align-items: center; gap: 12px;
  }
  .card-icon {
    font-size: clamp(26px, 4vw, 36px);
    flex-shrink: 0;
    transition: transform 0.3s;
  }
  .app-card:hover .card-icon { transform: scale(1.18) rotate(-6deg); }

  .card-meta { flex: 1; min-width: 0; }
  .card-tag {
    font-size: 9px; font-weight: 700;
    letter-spacing: 3px; text-transform: uppercase;
    color: var(--naranja); margin-bottom: 4px;
  }
  .card-title {
    font-family: 'Cinzel', serif;
    color: var(--blanco);
    font-size: clamp(12px, 1.8vw, 17px);
    font-weight: 700; line-height: 1.25;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-arrow {
    position: absolute; bottom: 14px; right: 16px;
    font-size: 16px; color: var(--naranja);
    opacity: 0; transform: translateX(-8px);
    transition: opacity 0.3s, transform 0.3s;
  }
  .app-card:hover .card-arrow { opacity: 1; transform: translateX(0); }

  .dev-badge {
    display: inline-block; margin-top: 10px;
    font-size: 9px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--naranja-claro);
    background: rgba(240,120,32,0.08);
    border: 1px solid rgba(240,120,32,0.2);
    padding: 3px 9px; border-radius: 2px;
  }
</style>
</head>
<body>

<!-- ============= INTRO ============= -->
<div id="intro">
  <canvas id="introCanvas"></canvas>
</div>

<!-- ============= PORTAL ============= -->
<div id="portal">
  <div class="portal-content">

    <header class="portal-header">
      <img src="IMG-20260325-WA0013.png" alt="Logo" class="portal-logo"
           onerror="this.style.background='var(--naranja)'">
      <div class="portal-header-text">
        <h1>Municipio de Caá Catí</h1>
        <p>Cerca de todo</p>
      </div>
    </header>

    <div class="apps-grid">

      <a href="https://caacati.github.io/pagos-municipales/" target="_blank" class="app-card">
        <div class="card-row">
          <span class="card-icon">💳</span>
          <div class="card-meta">
            <div class="card-tag">Finanzas</div>
            <div class="card-title">Pagos Municipales</div>
          </div>
        </div>
        <span class="card-arrow">→</span>
      </a>

      <a href="https://caacati.github.io/agenda_intendente/" target="_blank" class="app-card">
        <div class="card-row">
          <span class="card-icon">📅</span>
          <div class="card-meta">
            <div class="card-tag">Gestión</div>
            <div class="card-title">Agenda del Intendente</div>
          </div>
        </div>
        <span class="card-arrow">→</span>
      </a>

      <a href="https://caacati.github.io/stockmuni/" target="_blank" class="app-card">
        <div class="card-row">
          <span class="card-icon">📦</span>
          <div class="card-meta">
            <div class="card-tag">Inventario</div>
            <div class="card-title">Stock Municipal</div>
          </div>
        </div>
        <span class="card-arrow">→</span>
      </a>

      <div class="app-card dev">
        <div class="card-row">
          <span class="card-icon">🗂️</span>
          <div class="card-meta">
            <div class="card-tag">Administración</div>
            <div class="card-title">Expedientes</div>
          </div>
        </div>
        <span class="dev-badge">⚙ En desarrollo</span>
      </div>

    </div>
  </div>
</div>

<script>
// =====================================================================
//  INTRO — El logo ENTERO se forma y desvanece en partículas
//  Técnica: sampleo de píxeles del logo → cada partícula = un píxel
// =====================================================================
const canvas = document.getElementById('introCanvas');
const ctx    = canvas.getContext('2d');

let W, H, cx, cy, LOGO_SIZE;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2; cy = H / 2;
  LOGO_SIZE = Math.min(W, H) * 0.60;
}
resize();

let particles   = [];
let bgParticles = [];
let phase       = 'loading'; // loading → forming → hold → dissolving → done
let startTime   = null;
let animId      = null;

const FORM_DUR     = 2000;
const HOLD_DUR     = 1600;
const DISSOLVE_DUR = 1500;

// ---- Fondo: partículas naranjas flotando ----
function makeBgParticle(forceBottom) {
  return {
    x:      Math.random() * (W || window.innerWidth),
    y:      forceBottom ? (H || window.innerHeight) + 5 : Math.random() * (H || window.innerHeight),
    r:      0.7 + Math.random() * 2.2,
    vy:     -(0.15 + Math.random() * 0.55),
    vx:     (Math.random() - 0.5) * 0.3,
    maxAlpha: 0.12 + Math.random() * 0.45,
    life:   0,
    maxLife: 130 + Math.random() * 170,
    hue:    18 + Math.random() * 28,
    sat:    80 + Math.random() * 20,
    lit:    52 + Math.random() * 28,
  };
}
for (let i = 0; i < 140; i++) bgParticles.push(makeBgParticle(false));

// ---- Cargar logo y samplear ----
const img = new Image();
img.src   = 'IMG-20260325-WA0013.png';

img.onload = () => {
  buildParticlesFromImage();
  phase     = 'forming';
  startTime = performance.now();
  animId    = requestAnimationFrame(loop);
};
img.onerror = () => {
  // Sin imagen, ir directo al portal
  enterPortal();
};

function buildParticlesFromImage() {
  const SZ  = 500; // mayor resolución de sampleo
  const off = document.createElement('canvas');
  off.width = off.height = SZ;
  const oc  = off.getContext('2d');
  oc.drawImage(img, 0, 0, SZ, SZ);
  const data = oc.getImageData(0, 0, SZ, SZ).data;

  // paso más chico = más densidad
  const step  = 3;
  const pool  = [];

  for (let py = 0; py < SZ; py += step) {
    for (let px = 0; px < SZ; px += step) {
      const i = (py * SZ + px) * 4;
      const a = data[i + 3];
      if (a < 40) continue;
      pool.push({
        nx: px / SZ, ny: py / SZ,
        r: data[i], g: data[i+1], b: data[i+2], a: a / 255,
      });
    }
  }

  shuffle(pool);
  const MAX = 7000;
  const src = pool.slice(0, MAX);

  // Tamaño de punto relativo al LOGO_SIZE para que no queden huecos
  const dotSize = (LOGO_SIZE / SZ) * step * 0.85;

  particles = src.map(lp => {
    const tx = cx - LOGO_SIZE/2 + lp.nx * LOGO_SIZE;
    const ty = cy - LOGO_SIZE/2 + lp.ny * LOGO_SIZE;
    const angle = Math.random() * Math.PI * 2;
    const dist  = W * 0.35 + Math.random() * W * 0.35;
    return {
      lp,
      ox: cx + Math.cos(angle) * dist,
      oy: cy + Math.sin(angle) * dist,
      tx, ty,
      sx: null, sy: null,
      size:  dotSize * (0.85 + Math.random() * 0.45),
      delay: Math.random() * 0.55,
    };
  });
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function easeOut3(t) { return 1 - Math.pow(1 - t, 3); }
function easeIn3(t)  { return t * t * t; }

function loop(ts) {
  if (!startTime) startTime = ts;
  const elapsed = ts - startTime;

  ctx.clearRect(0, 0, W, H);

  // Fondo
  for (const p of bgParticles) {
    p.life++;
    p.x += p.vx; p.y += p.vy;
    const prog = p.life / p.maxLife;
    const a    = p.maxAlpha * (prog < 0.18 ? prog/0.18 : 1 - (prog-0.18)/0.82);
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fillStyle = `hsla(${p.hue},${p.sat}%,${p.lit}%,${Math.max(0,a)})`;
    ctx.fill();
    if (p.life >= p.maxLife || p.y < -6) Object.assign(p, makeBgParticle(true));
  }

  // Logo en partículas
  if (phase === 'forming') {
    const t = Math.min(elapsed / FORM_DUR, 1);
    for (const p of particles) {
      const lt = Math.max(0, Math.min(1, (t - p.delay * 0.45) / (1 - p.delay * 0.45)));
      const et = easeOut3(lt);
      const x  = p.ox + (p.tx - p.ox) * et;
      const y  = p.oy + (p.ty - p.oy) * et;
      const a  = p.lp.a * et;
      drawDot(x, y, p.size, p.lp, a);
    }
    if (t >= 1) { phase = 'hold'; startTime = ts; }

  } else if (phase === 'hold') {
    for (const p of particles) drawDot(p.tx, p.ty, p.size, p.lp, p.lp.a);
    if (elapsed >= HOLD_DUR) { phase = 'dissolving'; startTime = ts; }

  } else if (phase === 'dissolving') {
    const t = Math.min(elapsed / DISSOLVE_DUR, 1);
    for (const p of particles) {
      if (!p.sx) {
        const angle = Math.random() * Math.PI * 2;
        const dist  = W * 0.3 + Math.random() * W * 0.35;
        p.sx = cx + Math.cos(angle) * dist;
        p.sy = cy + Math.sin(angle) * dist;
      }
      const et = easeIn3(t);
      const x  = p.tx + (p.sx - p.tx) * et;
      const y  = p.ty + (p.sy - p.ty) * et;
      const a  = p.lp.a * (1 - t);
      drawDot(x, y, p.size, p.lp, a);
    }
    if (t >= 1) { phase = 'done'; enterPortal(); return; }
  }

  animId = requestAnimationFrame(loop);
}

function drawDot(x, y, size, lp, alpha) {
  if (alpha <= 0) return;
  ctx.beginPath();
  ctx.arc(x, y, size, 0, Math.PI*2);
  ctx.fillStyle = `rgba(${lp.r},${lp.g},${lp.b},${alpha})`;
  ctx.fill();
}

function enterPortal() {
  if (animId) { cancelAnimationFrame(animId); animId = null; }
  const intro  = document.getElementById('intro');
  const portal = document.getElementById('portal');
  intro.classList.add('fade-out');
  setTimeout(() => {
    intro.style.display = 'none';
    portal.classList.add('visible');
  }, 1000);
}

// Click para saltear
canvas.addEventListener('click', () => {
  if (phase !== 'done') { phase = 'done'; enterPortal(); }
});
</script>
</body>
</html>
