<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#F07820">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Muni Caá Catí">
<link rel="apple-touch-icon" href="Gestion.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Municipio de Caá Catí</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;900&family=Raleway:wght@300;400;500;700&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --naranja:       #F07820;
  --naranja-dark:  #C95F0A;
  --naranja-light: #FFA04A;
  --naranja-glow:  rgba(240,120,32,0.18);
  --bg:            #100B1C;
  --glass:         rgba(255,255,255,0.08);
  --glass-strong:  rgba(255,255,255,0.14);
  --glass-border:  rgba(255,255,255,0.22);
  --border:        rgba(255,255,255,0.14);
  --text:          #FFFFFF;
  --text-dim:      rgba(255,255,255,0.58);
}

html, body {
  height: 100%; width: 100%;
  background: var(--bg);
  font-family: 'Raleway', sans-serif;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ══════════════════════════════════════
   FONDO — BLOBS DE GRADIENTE (dan vida al vidrio)
══════════════════════════════════════ */
.bg-blobs {
  position: fixed; inset: 0; z-index: 0;
  overflow: hidden;
  background: var(--bg);
}
.blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(70px);
  opacity: 0.55;
  will-change: transform;
}
.blob-1 {
  width: 60vmax; height: 60vmax;
  top: -20vmax; left: -18vmax;
  background: radial-gradient(circle, var(--naranja) 0%, transparent 70%);
  animation: blobFloat1 22s ease-in-out infinite;
}
.blob-2 {
  width: 55vmax; height: 55vmax;
  bottom: -22vmax; right: -16vmax;
  background: radial-gradient(circle, #3E7BFA 0%, transparent 70%);
  animation: blobFloat2 26s ease-in-out infinite;
}
.blob-3 {
  width: 42vmax; height: 42vmax;
  bottom: 8vmax; left: -14vmax;
  background: radial-gradient(circle, #9B3FE0 0%, transparent 70%);
  animation: blobFloat3 19s ease-in-out infinite;
}
@keyframes blobFloat1 {
  0%, 100% { transform: translate(0,0) scale(1); }
  50%      { transform: translate(6vmax, 8vmax) scale(1.12); }
}
@keyframes blobFloat2 {
  0%, 100% { transform: translate(0,0) scale(1); }
  50%      { transform: translate(-7vmax, -6vmax) scale(1.15); }
}
@keyframes blobFloat3 {
  0%, 100% { transform: translate(0,0) scale(1); }
  50%      { transform: translate(5vmax, -5vmax) scale(1.08); }
}

/* ══════════════════════════════════════
   INTRO MODERNA — MESH PARTICLES + ANILLOS
══════════════════════════════════════ */
#intro {
  position: fixed; inset: 0; z-index: 200;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: transparent;
  overflow: hidden;
}

/* Canvas de partículas */
#particle-canvas {
  position: absolute; inset: 0;
  z-index: 1;
}

/* Vignette */
.intro-vignette {
  position: absolute; inset: 0; z-index: 2;
  pointer-events: none;
  background: radial-gradient(ellipse at center, transparent 0%, transparent 40%, rgba(12,12,12,0.9) 100%);
}

/* Contenedor del logo + anillos */
.intro-center {
  position: relative;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Logo central — MÁS GRANDE */
.intro-logo {
  width: min(72vw, 300px);
  height: min(72vw, 300px);
  border-radius: 50%;
  display: block;
  position: relative;
  z-index: 10;
  opacity: 0;
  animation: logoReveal 1.2s 0.3s cubic-bezier(0.16,1,0.3,1) forwards;
  box-shadow:
    0 0 0 1px rgba(240,120,32,0.3),
    0 0 60px rgba(240,120,32,0.2),
    0 0 120px rgba(240,120,32,0.08);
  animation: logoReveal 1.2s 0.3s cubic-bezier(0.16,1,0.3,1) forwards,
             logoFloat 4s ease-in-out infinite,
             logoPulseGlow 3s ease-in-out infinite;
}

/* Anillos orbitando el logo — AJUSTADOS AL TAMAÑO */
.orbit-ring {
  position: absolute;
  border-radius: 50%;
  border: 1px solid transparent;
  pointer-events: none;
  opacity: 0;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
}
.orbit-ring-1 {
  width: min(92vw, 380px);
  height: min(92vw, 380px);
  border-top: 1.5px solid rgba(240,120,32,0.4);
  border-right: 1px solid rgba(240,120,32,0.1);
  animation: orbitIn 1s 0.5s ease forwards, spin1 10s linear infinite;
}
.orbit-ring-2 {
  width: min(110vw, 460px);
  height: min(110vw, 460px);
  border-bottom: 1px solid rgba(240,120,32,0.25);
  border-left: 1.5px solid rgba(240,120,32,0.08);
  animation: orbitIn 1s 0.7s ease forwards, spin2 15s linear infinite reverse;
}
.orbit-ring-3 {
  width: min(130vw, 540px);
  height: min(130vw, 540px);
  border: 1px dashed rgba(240,120,32,0.12);
  animation: orbitIn 1s 0.9s ease forwards, spin1 25s linear infinite;
}

/* Puntos orbitales */
.orbit-dot {
  position: absolute;
  width: 6px; height: 6px;
  background: var(--naranja);
  border-radius: 50%;
  box-shadow: 0 0 10px var(--naranja), 0 0 20px var(--naranja);
}
.orbit-dot-1 {
  top: -3px; left: 50%; transform: translateX(-50%);
  animation: dotPulse 2s ease-in-out infinite;
}
.orbit-dot-2 {
  bottom: -3px; left: 50%; transform: translateX(-50%);
  animation: dotPulse 2s 1s ease-in-out infinite;
}
.orbit-dot-3 {
  top: 50%; right: -3px; transform: translateY(-50%);
  animation: dotPulse 2s 0.5s ease-in-out infinite;
}

/* Animaciones */
@keyframes logoReveal {
  0%   { opacity: 0; transform: scale(0.3); filter: blur(20px); }
  60%  { filter: blur(2px); }
  100% { opacity: 1; transform: scale(1); filter: blur(0px); }
}
@keyframes logoFloat {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-8px); }
}
@keyframes logoPulseGlow {
  0%, 100% { box-shadow: 0 0 0 1px rgba(240,120,32,0.3), 0 0 60px rgba(240,120,32,0.2), 0 0 120px rgba(240,120,32,0.08); }
  50%      { box-shadow: 0 0 0 1px rgba(240,120,32,0.5), 0 0 80px rgba(240,120,32,0.35), 0 0 160px rgba(240,120,32,0.15); }
}
@keyframes orbitIn {
  from { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
  to   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
}
@keyframes spin1 {
  from { transform: translate(-50%, -50%) rotate(0deg); }
  to   { transform: translate(-50%, -50%) rotate(360deg); }
}
@keyframes spin2 {
  from { transform: translate(-50%, -50%) rotate(0deg); }
  to   { transform: translate(-50%, -50%) rotate(-360deg); }
}
@keyframes dotPulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%      { opacity: 0.5; transform: scale(0.6); }
}

/* Salida de intro */
#intro.out {
  animation: introOut 0.9s cubic-bezier(0.65, 0, 0.35, 1) forwards;
}
@keyframes introOut {
  0%   { opacity: 1; transform: scale(1); filter: blur(0); }
  100% { opacity: 0; transform: scale(1.08); filter: blur(8px); pointer-events: none; }
}

/* ══════════════════════════════════════
   PORTAL (sin cambios)
══════════════════════════════════════ */
#portal {
  position: fixed; inset: 0; z-index: 100;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: transparent;
  opacity: 0; pointer-events: none;
  transition: opacity 0.8s 0.1s ease;
  padding: env(safe-area-inset-top, 0) 0 env(safe-area-inset-bottom, 0);
}
#portal.show { opacity: 1; pointer-events: all; }

#portal::before {
  content: '';
  position: absolute; inset: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 80% 40% at 50% 0%, rgba(240,120,32,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 50% 30% at 50% 100%, rgba(240,120,32,0.05) 0%, transparent 60%);
}

.portal-inner {
  position: relative; z-index: 1;
  width: 100%; max-width: 540px;
  padding: 0 20px;
  display: flex; flex-direction: column;
  height: 100vh;
  justify-content: center;
  gap: 0;
}

.p-header {
  display: flex; flex-direction: column; align-items: center; text-align: center; gap: 8px;
  margin-top: 20px;
  padding: 22px 18px 20px;
  margin-bottom: 18px;
  background: var(--glass);
  backdrop-filter: blur(24px) saturate(160%);
  -webkit-backdrop-filter: blur(24px) saturate(160%);
  border: 1px solid var(--glass-border);
  border-radius: 22px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.25);
  opacity: 0;
  animation: slideDown 0.6s 0.1s ease forwards;
  flex-shrink: 0;
}
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.p-logo {
  width: 60px; height: 60px;
  border-radius: 50%; flex-shrink: 0;
  box-shadow: 0 0 14px rgba(240,120,32,0.35);
}
.p-title {
  font-family: 'Cinzel', serif;
  color: var(--text);
  font-size: 15px;
  letter-spacing: 2px;
  line-height: 1.25;
}
.p-sub {
  font-family: 'Dancing Script', cursive;
  color: var(--naranja-light);
  font-size: 15px;
  margin-top: 1px;
}

.modules {
  display: flex; flex-direction: column;
  gap: 12px;
  flex: 1;
  justify-content: center;
}

.mod {
  display: flex; align-items: center;
  gap: 18px;
  background: var(--glass);
  backdrop-filter: blur(20px) saturate(160%);
  -webkit-backdrop-filter: blur(20px) saturate(160%);
  border: 1px solid var(--glass-border);
  border-radius: 18px;
  padding: 16px 18px;
  text-decoration: none; color: inherit;
  position: relative; overflow: hidden;
  cursor: pointer;
  opacity: 0;
  box-shadow: 0 8px 24px rgba(0,0,0,0.28), inset 0 1px 0 rgba(255,255,255,0.22);
  transition:
    background 0.25s,
    border-color 0.25s,
    transform 0.25s cubic-bezier(0.16,1,0.3,1),
    box-shadow 0.25s;
  -webkit-user-select: none; user-select: none;
}
.mod:nth-child(1) { animation: modIn 0.5s 0.15s ease forwards; }
.mod:nth-child(2) { animation: modIn 0.5s 0.25s ease forwards; }
.mod:nth-child(3) { animation: modIn 0.5s 0.35s ease forwards; }
.mod:nth-child(4) { animation: modIn 0.5s 0.45s ease forwards; }
@keyframes modIn {
  from { opacity: 0; transform: translateX(-16px); }
  to   { opacity: 1; transform: translateX(0); }
}

.mod::before {
  content: '';
  position: absolute; left: 0; top: 20%; bottom: 20%;
  width: 3px;
  background: linear-gradient(180deg, var(--naranja-dark), var(--naranja-light));
  border-radius: 0 3px 3px 0;
  opacity: 0;
  transition: opacity 0.25s, top 0.25s, bottom 0.25s;
}

.mod::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(240,120,32,0.06) 0%, transparent 60%);
  opacity: 0; transition: opacity 0.25s;
}

.mod:hover, .mod:active {
  background: var(--glass-strong);
  border-color: rgba(240,120,32,0.45);
  transform: translateX(4px) translateY(-2px);
  box-shadow: 0 14px 36px rgba(0,0,0,0.4), -4px 0 24px rgba(240,120,32,0.1), inset 0 1px 0 rgba(255,255,255,0.3);
}
.mod:hover::before, .mod:active::before { opacity: 1; top: 10%; bottom: 10%; }
.mod:hover::after,  .mod:active::after  { opacity: 1; }

.mod-icon {
  font-size: 34px; flex-shrink: 0;
  width: 62px; height: 62px;
  display: flex; align-items: center; justify-content: center;
  background: rgba(255,255,255,0.10);
  backdrop-filter: blur(8px);
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.20);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.25);
  transition: transform 0.25s, background 0.25s;
}
.mod:hover .mod-icon, .mod:active .mod-icon {
  transform: scale(1.1);
  background: rgba(240,120,32,0.22);
}

.mod-text { flex: 1; min-width: 0; }
.mod-tag {
  font-size: 11px; font-weight: 700;
  letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--naranja); margin-bottom: 5px;
}
.mod-name {
  font-family: 'Raleway', sans-serif;
  color: var(--text);
  font-size: 19px; font-weight: 700;
  line-height: 1.25;
}

.mod-right {
  flex-shrink: 0;
  display: flex; align-items: center;
}
.mod-arrow {
  color: var(--naranja);
  font-size: 18px; font-weight: 300;
  opacity: 0;
  transform: translateX(-6px);
  transition: opacity 0.25s, transform 0.25s;
}
.mod:hover .mod-arrow, .mod:active .mod-arrow {
  opacity: 1; transform: translateX(0);
}
</style>
<base target="_blank">
</head>
<body>

<!-- FONDO GLASSMORPHISM -->
<div class="bg-blobs">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>

<!-- INTRO LIMPIA: solo logo + anillos + partículas -->
<div id="intro">
  <canvas id="particle-canvas"></canvas>
  <div class="intro-vignette"></div>

  <div class="intro-center">
    <div class="orbit-ring orbit-ring-1"><div class="orbit-dot orbit-dot-1"></div></div>
    <div class="orbit-ring orbit-ring-2"><div class="orbit-dot orbit-dot-2"></div></div>
    <div class="orbit-ring orbit-ring-3"><div class="orbit-dot orbit-dot-3"></div></div>

    <img class="intro-logo" src="IMG-20260325-WA0013.png" alt="Municipio de Caá Catí"
         onerror="this.style.background='var(--naranja)';this.style.display='block'">
  </div>
</div>

<!-- PORTAL -->
<div id="portal">
  <div class="portal-inner">

    <div class="p-header">
      <img class="p-logo" src="IMG-20260325-WA0013.png" alt="Logo"
           onerror="this.style.background='var(--naranja)'">
      <div>
        <div class="p-title">Municipalidad de Caá Catí</div>
        <div class="p-sub">Cerca de todo</div>
      </div>
    </div>

    <div class="modules">

      <a class="mod" href="https://caacati.github.io/pagos-municipales/" target="_blank">
        <div class="mod-icon">💳</div>
        <div class="mod-text">
          <div class="mod-tag">Finanzas</div>
          <div class="mod-name">Pagos Municipales</div>
        </div>
        <div class="mod-right"><span class="mod-arrow">›</span></div>
      </a>

      <a class="mod" href="https://caacati.github.io/agenda_intendente/" target="_blank">
        <div class="mod-icon">📅</div>
        <div class="mod-text">
          <div class="mod-tag">Gestión</div>
          <div class="mod-name">Agenda del Intendente</div>
        </div>
        <div class="mod-right"><span class="mod-arrow">›</span></div>
      </a>

      <a class="mod" href="https://caacati.github.io/stockmuni/" target="_blank">
        <div class="mod-icon">📦</div>
        <div class="mod-text">
          <div class="mod-tag">Inventario</div>
          <div class="mod-name">Stock Municipal</div>
        </div>
        <div class="mod-right"><span class="mod-arrow">›</span></div>
      </a>

      <a class="mod" href="https://caacati.github.io/comparativo-financiero/" target="_blank">
        <div class="mod-icon">📊</div>
        <div class="mod-text">
          <div class="mod-tag">Finanzas</div>
          <div class="mod-name">Comparativo Financiero</div>
        </div>
        <div class="mod-right"><span class="mod-arrow">›</span></div>
      </a>

    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════
   SISTEMA DE PARTÍCULAS (Canvas)
══════════════════════════════════════ */
const canvas = document.getElementById('particle-canvas');
const ctx = canvas.getContext('2d');

let particles = [];
let mouse = { x: null, y: null };

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// Crear partículas
const PARTICLE_COUNT = window.innerWidth < 768 ? 50 : 90;
for (let i = 0; i < PARTICLE_COUNT; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    vx: (Math.random() - 0.5) * 0.6,
    vy: (Math.random() - 0.5) * 0.6,
    radius: Math.random() * 1.5 + 0.5,
    alpha: Math.random() * 0.5 + 0.2
  });
}

// Mouse tracking
window.addEventListener('mousemove', (e) => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});
window.addEventListener('touchmove', (e) => {
  mouse.x = e.touches[0].clientX;
  mouse.y = e.touches[0].clientY;
});
window.addEventListener('mouseleave', () => { mouse.x = null; mouse.y = null; });

function drawParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Dibujar conexiones
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < 140) {
        const opacity = (1 - dist / 140) * 0.15;
        ctx.beginPath();
        ctx.strokeStyle = `rgba(240, 120, 32, ${opacity})`;
        ctx.lineWidth = 0.5;
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.stroke();
      }
    }
  }

  // Conexiones al mouse
  if (mouse.x !== null) {
    for (let i = 0; i < particles.length; i++) {
      const dx = particles[i].x - mouse.x;
      const dy = particles[i].y - mouse.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 180) {
        const opacity = (1 - dist / 180) * 0.25;
        ctx.beginPath();
        ctx.strokeStyle = `rgba(240, 120, 32, ${opacity})`;
        ctx.lineWidth = 0.7;
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(mouse.x, mouse.y);
        ctx.stroke();
      }
    }
  }

  // Dibujar partículas
  for (let p of particles) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(240, 120, 32, ${p.alpha})`;
    ctx.fill();

    // Movimiento
    p.x += p.vx;
    p.y += p.vy;

    // Rebote en bordes
    if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
    if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
  }

  requestAnimationFrame(drawParticles);
}
drawParticles();

/* ══════════════════════════════════════
   TRANSICIÓN INTRO → PORTAL
══════════════════════════════════════ */
const intro  = document.getElementById('intro');
const portal = document.getElementById('portal');
let done = false;

function goPortal() {
  if (done) return;
  done = true;
  intro.classList.add('out');
  setTimeout(() => {
    intro.style.display = 'none';
    portal.classList.add('show');
  }, 850);
}

setTimeout(goPortal, 3800);
intro.addEventListener('click', goPortal);
intro.addEventListener('touchstart', goPortal, { passive: true });
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js');
  });
}
</script>
</body>
</html>
